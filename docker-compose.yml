services:
  stat:
    build: ./stat
    environment:
      STAT_PORT: "8002"
      SQLITE_PATH: /data/listenai.db
    volumes:
      - ./data:/data
    ports:
      - "8002:8002"

  nlp:
    build: ./nlp
    environment:
      NLP_PORT: "8001"
    ports:
      - "8001:8001"

  gateway:
    build: ./gateway
    environment:
      GATEWAY_PORT: "8000"
      STAT_URL: http://stat:8002
      NLP_URL: http://nlp:8001
      JWT_SECRET: supersecret
      DEMO_USER: admin
      DEMO_PASS: admin123
    ports:
      - "8000:8000"
    depends_on:
      - stat
      - nlp

  frontend:
    build: ./frontend
    environment:
      GATEWAY_URL: http://gateway:8000
    ports:
      - "8501:8501"
    depends_on:
      - gateway
